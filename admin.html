<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Area | Powered PYQs</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            overflow: auto;
            background-color: var(--bg-main);
        }

        .admin-page {
            min-height: 100vh;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            background: var(--bg-surface-solid);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-soft);
        }

        .admin-page-header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-back-link {
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: var(--transition);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            background: var(--bg-main);
        }

        .admin-back-link:hover {
            color: var(--primary);
            background: var(--primary-light);
            transform: translateX(-3px);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 2rem;
        }

        .admin-panel {
            background: var(--bg-surface-solid);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
        }

        .admin-panel:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-4px);
        }

        .admin-panel h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            border-left: 4px solid var(--primary);
            padding-left: 1rem;
        }

        .admin-status {
            margin-top: 1.5rem;
            color: var(--primary);
            font-weight: 500;
            min-height: 1.5rem;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .admin-page {
                padding: 1.5rem 1rem;
            }

            .admin-page-header {
                flex-direction: column;
                align-items: flex-start;
                padding: 1.5rem;
            }

            .admin-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="admin-page">
        <header class="admin-page-header">
            <div>
                <h1>Admin Area</h1>
                <p style="color: var(--text-muted); margin-top: 0.35rem;">Manage questions and recommended resources.</p>
            </div>
            <a class="admin-back-link" href="index.html"><i class="ri-arrow-left-line"></i> Back to site</a>
        </header>

        <section class="admin-panel" id="login-panel">
            <h2>Login</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="admin-username" placeholder="Enter username" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="admin-password" placeholder="Enter password" autocomplete="current-password">
            </div>
            <button class="btn-primary" id="admin-login-button">Login</button>
            <p class="admin-status" id="login-status"></p>
        </section>

        <section class="admin-grid hidden" id="admin-tools">
            <form class="admin-panel" id="question-form">
                <h2>Upload Question</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Subject</label>
                        <select id="question-subject" required>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Science">Science</option>
                            <option value="Social Science">Social Science</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Chapter</label>
                        <input type="text" id="question-chapter" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="question-year" required>
                    </div>
                    <div class="form-group">
                        <label>Topic</label>
                        <input type="text" id="question-topic" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Question</label>
                    <textarea id="question-text" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL or base64 (Optional)</label>
                    <input type="text" id="question-image">
                </div>
                <div class="form-group">
                    <label>Solution</label>
                    <textarea id="question-solution" rows="5" required></textarea>
                </div>
                <button class="btn-primary" type="submit">Upload Question</button>
                <p class="admin-status" id="question-status"></p>
            </form>

            <form class="admin-panel" id="affiliate-form">
                <h2>Upload Resource</h2>
                <div class="form-group">
                    <label>Title / Product Name</label>
                    <input type="text" id="affiliate-title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="affiliate-description" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Affiliate URL</label>
                    <input type="url" id="affiliate-url" required>
                </div>
                <div class="form-group">
                    <label>Image URL or base64 (Optional)</label>
                    <input type="text" id="affiliate-image">
                </div>
                <button class="btn-primary" type="submit">Upload Resource</button>
                <p class="admin-status" id="affiliate-status"></p>
            </form>

            <form class="admin-panel" id="generate-keys-form">
                <h2>Generate Access Keys</h2>
                <div class="form-group">
                    <label>Number of Keys to Generate</label>
                    <input type="number" id="keys-count" value="1" min="1" max="50" required>
                </div>
                <div class="form-group">
                    <label>Duration (Hours)</label>
                    <input type="number" id="keys-duration" value="24" min="1" max="720" required>
                </div>
                <button class="btn-primary" type="submit">Generate Keys</button>
                <div id="generated-keys-container" style="margin-top: 1rem; display: none;">
                    <label>New Keys (Copy These):</label>
                    <textarea id="generated-keys-list" rows="4" readonly style="width: 100%; font-family: monospace; padding: 0.5rem;"></textarea>
                </div>
                <p class="admin-status" id="keys-status"></p>
            </form>
        </section>
    </main>

    <script>
        const API_URL = '/api/questions';
        const loginPanel = document.getElementById('login-panel');
        const adminTools = document.getElementById('admin-tools');
        const loginStatus = document.getElementById('login-status');

        document.getElementById('admin-login-button').addEventListener('click', () => {
            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;

            if (!username) {
                loginStatus.textContent = 'Please enter a username.';
                return;
            }

            if (password !== 'admin123') {
                loginStatus.textContent = 'Incorrect password.';
                return;
            }

            loginPanel.classList.add('hidden');
            adminTools.classList.remove('hidden');
        });

        document.getElementById('question-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const status = document.getElementById('question-status');
            status.textContent = 'Uploading...';

            const payload = {
                id: 'custom_' + Date.now(),
                subject: document.getElementById('question-subject').value,
                chapter: document.getElementById('question-chapter').value.trim(),
                year: document.getElementById('question-year').value.trim(),
                topic: document.getElementById('question-topic').value.trim(),
                question: document.getElementById('question-text').value.trim(),
                image: document.getElementById('question-image').value.trim() || null,
                solution: document.getElementById('question-solution').value.trim()
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Upload failed.');
                event.target.reset();
                status.textContent = 'Question uploaded successfully.';
            } catch (error) {
                status.textContent = error.message;
            }
        });

        document.getElementById('affiliate-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const status = document.getElementById('affiliate-status');
            status.textContent = 'Uploading...';

            const payload = {
                id: 'aff_' + Date.now(),
                title: document.getElementById('affiliate-title').value.trim(),
                description: document.getElementById('affiliate-description').value.trim(),
                url: document.getElementById('affiliate-url').value.trim(),
                image: document.getElementById('affiliate-image').value.trim() || null
            };

            try {
                const response = await fetch('/api/affiliates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Upload failed.');
                event.target.reset();
                status.textContent = 'Resource uploaded successfully.';
            } catch (error) {
                status.textContent = error.message;
            }
        });

        document.getElementById('generate-keys-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const status = document.getElementById('keys-status');
            const container = document.getElementById('generated-keys-container');
            const list = document.getElementById('generated-keys-list');
            
            status.textContent = 'Generating...';
            container.style.display = 'none';

            const payload = {
                count: parseInt(document.getElementById('keys-count').value),
                hours: parseInt(document.getElementById('keys-duration').value)
            };

            try {
                const response = await fetch('/api/admin/generate-keys', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Failed to generate keys.');
                
                status.textContent = `Successfully generated ${result.keys.length} key(s).`;
                list.value = result.keys.join('\n');
                container.style.display = 'block';
            } catch (error) {
                status.textContent = error.message;
            }
        });
    </script>
</body>
</html>
